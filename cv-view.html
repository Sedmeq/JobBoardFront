<!DOCTYPE html>
<html lang="en">

<head>
    <title>CV - JobBoard</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: #eef0f5;
            color: #2d3340;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .cv-toolbar {
            background: #1f2533;
            color: #fff;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .cv-toolbar .cv-tb-title {
            font-size: 15px;
            font-weight: 600;
        }

        .cv-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2e55fa;
            color: #fff;
            border: 0;
            border-radius: 6px;
            padding: 9px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .cv-btn:hover {
            background: #1f43e0;
            color: #fff;
        }

        .cv-btn.secondary {
            background: #3a4150;
        }

        .cv-btn.secondary:hover {
            background: #4b5364;
        }

        .cv-wrap {
            max-width: 820px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .cv-paper {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .08);
            overflow: hidden;
        }

        .cv-head {
            background: linear-gradient(135deg, #2e55fa, #5b76ff);
            color: #fff;
            padding: 36px 40px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .cv-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, .5);
            background: #fff;
            flex-shrink: 0;
        }

        .cv-head h1 {
            margin: 0 0 6px;
            font-size: 28px;
            font-weight: 800;
        }

        .cv-head .cv-headline {
            margin: 0 0 10px;
            font-size: 16px;
            opacity: .92;
            font-weight: 500;
        }

        .cv-contact {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 18px;
            font-size: 13px;
        }

        .cv-contact span,
        .cv-contact a {
            color: #fff;
            opacity: .92;
            text-decoration: none;
        }

        .cv-contact a:hover {
            text-decoration: underline;
        }

        .cv-body {
            padding: 32px 40px 40px;
        }

        .cv-section {
            margin-bottom: 28px;
        }

        .cv-section:last-child {
            margin-bottom: 0;
        }

        .cv-section h2 {
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #2e55fa;
            margin: 0 0 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e7eaf3;
        }

        .cv-summary {
            font-size: 14px;
            line-height: 1.7;
            color: #4a5260;
            margin: 0;
        }

        .cv-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .cv-skill {
            background: #eef2ff;
            color: #2e55fa;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 13px;
            font-weight: 500;
        }

        .cv-item {
            margin-bottom: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid #f0f1f6;
        }

        .cv-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: 0;
        }

        .cv-item-head {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 4px;
        }

        .cv-item-title {
            font-size: 15px;
            font-weight: 700;
            color: #1f2533;
            margin: 0;
        }

        .cv-item-sub {
            font-size: 13px;
            color: #6b7280;
            margin: 2px 0 0;
        }

        .cv-item-date {
            font-size: 12px;
            color: #9aa1ad;
            font-weight: 500;
            white-space: nowrap;
        }

        .cv-item-desc {
            font-size: 13px;
            line-height: 1.6;
            color: #4a5260;
            margin: 8px 0 0;
        }

        .cv-langs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 24px;
        }

        .cv-lang {
            font-size: 14px;
        }

        .cv-lang strong {
            color: #1f2533;
        }

        .cv-lang span {
            color: #6b7280;
        }

        .cv-loading,
        .cv-error {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .cv-error {
            color: #c0392b;
        }

        @media (max-width: 600px) {
            .cv-head {
                flex-direction: column;
                text-align: center;
                padding: 28px 22px;
            }

            .cv-contact {
                justify-content: center;
            }

            .cv-body {
                padding: 24px 22px 30px;
            }
        }

        /* Print: yalnız CV kağızı görünsün, PDF kimi saxlanıla bilsin */
        @media print {
            body {
                background: #fff;
            }

            .cv-toolbar {
                display: none !important;
            }

            .cv-wrap {
                margin: 0;
                padding: 0;
                max-width: 100%;
            }

            .cv-paper {
                box-shadow: none;
                border-radius: 0;
            }

            .cv-item,
            .cv-section {
                page-break-inside: avoid;
            }
        }
    </style>
</head>

<body>
    <div class="cv-toolbar">
        <span class="cv-tb-title">Curriculum Vitae</span>
        <div>
            <a href="javascript:history.back();" class="cv-btn secondary">&larr; Back</a>
            <button type="button" id="cvDownloadBtn" class="cv-btn">&#x2193; Download PDF</button>
        </div>
    </div>

    <div class="cv-wrap">
        <div id="cvLoading" class="cv-loading">Loading CV...</div>
        <div id="cvError" class="cv-error" style="display:none;"></div>
        <div id="cvPaper" class="cv-paper" style="display:none;">
            <div class="cv-head">
                <img id="cvAvatar" class="cv-avatar" src="images/team/pic1.jpg" alt="">
                <div>
                    <h1 id="cvName">—</h1>
                    <p class="cv-headline" id="cvHeadline" style="display:none;"></p>
                    <div class="cv-contact" id="cvContact"></div>
                </div>
            </div>
            <div class="cv-body">
                <div class="cv-section" id="cvSummarySection" style="display:none;">
                    <h2>Profile Summary</h2>
                    <p class="cv-summary" id="cvSummary"></p>
                </div>
                <div class="cv-section" id="cvSkillsSection" style="display:none;">
                    <h2>Skills</h2>
                    <div class="cv-skills" id="cvSkills"></div>
                </div>
                <div class="cv-section" id="cvExpSection" style="display:none;">
                    <h2>Work Experience</h2>
                    <div id="cvExp"></div>
                </div>
                <div class="cv-section" id="cvEduSection" style="display:none;">
                    <h2>Education</h2>
                    <div id="cvEdu"></div>
                </div>
                <div class="cv-section" id="cvLangSection" style="display:none;">
                    <h2>Languages</h2>
                    <div class="cv-langs" id="cvLangs"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/script/api-client.js"></script>
    <script src="js/script/cv-view.js"></script>
</body>

</html>
