													<span>Log Out</span></a></li>

											class="site-button right-arrow button-sm float-end">Back</a>
									</div>
									<div id="changePassAlert" style="display:none;"></div>
									<form id="changePasswordForm">
										<div class="row">
											<div class="col-lg-12">
												<div class="form-group">
													<label>Old Password</label>
													<input id="oldPassword" type="password" class="form-control"
														required>
												</div>
											</div>
											<div class="col-lg-6">
												<div class="form-group">
													<label>New Password </label>
													<input id="newPassword" type="password" class="form-control"
														required>
												</div>
											</div>
											<div class="col-lg-6">
												<div class="form-group">
													<label>Confirm New Password</label>
													<input id="confirmNewPassword" type="password" class="form-control"
														required>
												</div>
											</div>
											<div class="col-lg-12 m-b10">
												<button id="changePassBtn" type="submit" class="site-button">Update
													Password</button>
											</div>
										</div>

								</div>

									</div>

									</div>
								</form>
