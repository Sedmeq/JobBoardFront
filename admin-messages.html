<!DOCTYPE html>
<html lang="en">

<head>
    <title>Job Board - Contact Messages</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" type="text/css" href="css/plugins.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/templete.css">
    <link class="skin" rel="stylesheet" type="text/css" href="css/skin/skin-1.css">
    <link rel="stylesheet" type="text/css" href="css/dark-layout.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Roboto:wght@100;300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body id="bg">
    <div class="page-wraper">
        <div id="loading-area"></div>
        <div id="header-placeholder"></div>

        <div class="page-content bg-white">
            <div class="content-block">
                <div class="section-full bg-white p-t50 p-b20">
                    <div class="container">
                        <div class="row">
                            <div class="col-xl-3 col-lg-4 m-b30">
                                <div class="sticky-top">
                                    <div class="candidate-info admin-info">
                                        <div class="candidate-detail text-center">
                                            <div class="canditate-des">
                                                <a href="javascript:void(0);"><img alt=""
                                                        src="images/team/pic1.jpg"></a>
                                            </div>
                                            <div class="candidate-title">
                                                <h4 class="m-b5"><a href="javascript:void(0);">Admin</a></h4>
                                                <p class="m-b0"><a href="javascript:void(0);">Administrator</a></p>
                                            </div>
                                        </div>
                                        <ul>
                                            <li><a href="admin-dashboard.html"><i class="fa fa-tachometer-alt"
                                                        aria-hidden="true"></i> <span>Dashboard</span></a></li>
                                            <li><a href="admin-users.html"><i class="far fa-user"
                                                        aria-hidden="true"></i> <span>Manage Users</span></a></li>
                                            <li><a href="admin-companies.html"><i class="fa fa-building"
                                                        aria-hidden="true"></i> <span>Manage Companies</span></a></li>
                                            <li><a href="admin-transactions.html"><i class="fa fa-random"
                                                        aria-hidden="true"></i> <span>Transactions</span></a></li>
                                            <li><a href="admin-categories.html"><i class="fa fa-tags"
                                                        aria-hidden="true"></i> <span>Categories</span></a></li>
                                            <li><a href="admin-messages.html" class="active"><i class="fa fa-envelope"
                                                        aria-hidden="true"></i> <span>Messages</span></a></li>
                                            <li><a href="admin-settings.html"><i class="fa fa-cog"
                                                        aria-hidden="true"></i> <span>Settings</span></a></li>
                                            <li><a href="index.html"><i class="fas fa-sign-out-alt"
                                                        aria-hidden="true"></i> <span>Log Out</span></a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                            <div class="col-xl-9 col-lg-8 m-b30">
                                <div class="job-bx table-job-bx clearfix">
                                    <div class="job-bx-title clearfix">
                                        <h5 class="font-weight-700 float-start text-uppercase">Contact Messages</h5>
                                        <div class="float-end">
                                            <select id="adminMsgFilter" class="d-inline-block" style="width:auto;">
                                                <option value="">All</option>
                                                <option value="unread">Unread</option>
                                                <option value="pending">Pending Reply</option>
                                                <option value="replied">Replied</option>
                                            </select>
                                        </div>
                                    </div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>From</th>
                                                <th>Subject</th>
                                                <th>Date</th>
                                                <th>Status</th>
                                                <th>Action</th>
                                            </tr>
                                        </thead>
                                        <tbody id="adminMsgBody">
                                            <tr>
                                                <td colspan="5" class="text-center p-a30"><i
                                                        class="fa fa-spinner fa-spin fa-2x text-primary"></i></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                    <div class="pagination-bx float-end">
                                        <ul class="pagination" id="adminMsgPagination"></ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Message Detail / Reply Modal -->
        <div class="modal fade" id="msgModal" tabindex="-1" role="dialog" aria-hidden="true" style="z-index:100000;">
            <div class="modal-dialog modal-lg" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="msgModalTitle">Message</h5>
                        <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div id="msgReplyAlert" style="display:none;"></div>
                        <p class="m-b5"><strong>Name:</strong> <span id="msgFromName"></span></p>
                        <p class="m-b5"><strong>Email:</strong> <span id="msgFromEmail"></span></p>
                        <p class="m-b5"><strong>Phone:</strong> <span id="msgFromPhone"></span></p>
                        <p class="m-b5"><strong>Subject:</strong> <span id="msgSubject"></span></p>
                        <div class="m-t15 m-b15 p-a15" style="background:#f5f5f7;border-radius:8px;">
                            <p class="m-b0" id="msgBody"></p>
                        </div>

                        <div id="msgPreviousReply" class="m-b15" style="display:none;">
                            <h6 class="text-uppercase">Previous Reply</h6>
                            <div class="p-a15" style="background:#eef2ff;border-radius:8px;">
                                <p class="m-b0" id="msgPreviousReplyText"></p>
                            </div>
                        </div>

                        <div class="form-group m-t15">
                            <label><strong>Reply</strong></label>
                            <textarea id="msgReplyText" rows="5" class="form-control"
                                placeholder="Cavabınızı yazın..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="site-button" id="msgReplyBtn">
                            <i class="fa fa-paper-plane"></i> Send Reply
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="footer-placeholder"></div>
        <button class="scroltop fa fa-chevron-up"></button>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="plugins/bootstrap-select/bootstrap-select.min.js"></script>
    <script src="plugins/bootstrap-touchspin/jquery.bootstrap-touchspin.js"></script>
    <script src="plugins/magnific-popup/magnific-popup.js"></script>
    <script src="plugins/counter/waypoints-min.js"></script>
    <script src="plugins/counter/counterup.min.js"></script>
    <script src="plugins/imagesloaded/imagesloaded.js"></script>
    <script src="plugins/masonry/masonry-3.1.4.js"></script>
    <script src="plugins/masonry/masonry.filter.js"></script>
    <script src="plugins/owl-carousel/owl.carousel.js"></script>
    <script src="plugins/scroll/scrollbar.min.js"></script>
    <script src="js/custom.js"></script>
    <script src="js/dz.carousel.js"></script>
    <script src="js/dz.ajax.js"></script>

    <script src="js/script/api-client.js"></script>
    <script src="js/script/admin-common.js"></script>
    <script src="js/script/admin-messages.js"></script>
    <script src="js/headerAndFooter.js"></script>
</body>

</html>
