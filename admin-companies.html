    <link rel="stylesheet" type="text/css" href="css/plugins.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/templete.css">
    <link class="skin" rel="stylesheet" type="text/css" href="css/skin/skin-1.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Roboto:wght@100;300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

<body id="bg">
    <div class="page-wraper">
        <div id="loading-area"></div>
        <div id="header-placeholder"></div>

        <div class="page-content bg-white">
            <div class="content-block">
                <div class="section-full bg-white p-t50 p-b20">
                    <div class="container">
                        <div class="row">
                            <div class="col-xl-3 col-lg-4 m-b30">
                                <div class="sticky-top">
                                    <div class="candidate-info admin-info">
                                        <div class="candidate-detail text-center">
                                            <div class="canditate-des">
                                                <a href="javascript:void(0);"><img alt=""
                                                        src="images/team/pic1.jpg"></a>
                                            </div>
                                            <div class="candidate-title">
                                                <h4 class="m-b5"><a href="javascript:void(0);">Admin</a></h4>
                                                <p class="m-b0"><a href="javascript:void(0);">Administrator</a></p>
                                            </div>
                                        </div>
                                        <ul>
                                            <li><a href="admin-dashboard.html"><i class="fa fa-tachometer-alt"
                                                        aria-hidden="true"></i> <span>Dashboard</span></a></li>
                                            <li><a href="admin-users.html"><i class="far fa-user"
                                                        aria-hidden="true"></i> <span>Manage Users</span></a></li>
                                            <li><a href="admin-companies.html" class="active"><i class="fa fa-building"
                                                        aria-hidden="true"></i> <span>Manage Companies</span></a></li>
                                            <li><a href="admin-transactions.html"><i class="fa fa-random"
                                                        aria-hidden="true"></i> <span>Transactions</span></a></li>
                                            <li><a href="admin-categories.html"><i class="fa fa-tags"
                                                        aria-hidden="true"></i> <span>Categories</span></a></li>
                                            <li><a href="admin-partners.html"><i class="fa fa-handshake"
                                                        aria-hidden="true"></i> <span>Partners</span></a></li>
                                            <li><a href="admin-testimonials.html"><i class="fa fa-quote-right"
                                                        aria-hidden="true"></i> <span>Testimonials</span></a></li>
                                            <li><a href="admin-messages.html"><i class="fa fa-envelope"
                                                        aria-hidden="true"></i> <span>Messages</span></a></li>
                                            <li><a href="admin-settings.html"><i class="fa fa-cog"
                                                        aria-hidden="true"></i> <span>Settings</span></a></li>
                                            <li><a href="index.html"><i class="fas fa-sign-out-alt"
                                                        aria-hidden="true"></i> <span>Log Out</span></a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                            <div class="col-xl-9 col-lg-8 m-b30">
                                <div class="job-bx table-job-bx clearfix">
                                    <div class="job-bx-title clearfix">
                                        <h5 class="font-weight-700 float-start text-uppercase">Manage Companies</h5>
                                    </div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Company</th>
                                                <th>Industry</th>
                                                <th>Location</th>
                                                <th>Jobs</th>
                                                <th>Verified</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="adminCompaniesBody">
                                            <tr>
                                                <td colspan="7" class="text-center p-a30"><i
                                                        class="fa fa-spinner fa-spin fa-2x text-primary"></i></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                    <div class="pagination-bx float-end">
                                        <ul class="pagination" id="adminCompaniesPagination"></ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="footer-placeholder"></div>
        <button class="scroltop fa fa-chevron-up"></button>
    </div>

    <!-- Company Profile View Modal -->
    <div class="modal fade" id="companyViewModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Company Profile Review</h5>
                    <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body" id="companyViewBody">
                    <div class="text-center p-a20"><i class="fa fa-spinner fa-spin fa-2x text-primary"></i></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="site-button" id="modalVerifyBtn"
                        style="background:#1c8a55;border-color:#1c8a55;"><i class="fa fa-check"></i> Verify</button>
                    <button type="button" class="site-button" id="modalUnverifyBtn"
                        style="background:#e67e22;border-color:#e67e22;"><i class="fa fa-times"></i> Unverify</button>
                    <button type="button" class="site-button" style="background:#6b7280;"
                        data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery.min.js"></script>

    <script src="plugins/owl-carousel/owl.carousel.js"></script>
    <script src="plugins/scroll/scrollbar.min.js"></script>
    <script src="js/custom.js"></script>
    <script src="js/dz.carousel.js"></script>
    <script src="js/dz.ajax.js"></script>

    <script src="js/script/api-client.js"></script>
    <script src="js/script/admin-common.js"></script>
    <script src="js/script/admin-companies.js"></script>
    <script src="js/headerAndFooter.js"></script>
</body>

</html>
