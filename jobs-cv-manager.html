<!DOCTYPE html>
<html lang="en">

<head>
	<title>CV Manager - JobBoard</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="images/favicon.ico" type="image/x-icon">

	<!-- STYLESHEETS -->
	<link rel="stylesheet" type="text/css" href="css/plugins.css">
	<link rel="stylesheet" type="text/css" href="css/style.css">
	<link rel="stylesheet" type="text/css" href="css/templete.css">
	<link class="skin" rel="stylesheet" type="text/css" href="css/skin/skin-1.css">
	<link rel="stylesheet" type="text/css" href="css/dark-layout.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Roboto:wght@100;300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
		rel="stylesheet">

	<style>
		.cvm-card {
			display: flex;
			align-items: center;
			justify-content: space-between;
			flex-wrap: wrap;
			gap: 14px;
			border: 1px solid #e6e8f1;
			border-radius: 10px;
			padding: 18px 20px;
			margin-bottom: 16px;
		}

		.cvm-left {
			display: flex;
			align-items: center;
			gap: 14px;
		}

		.cvm-icon {
			width: 50px;
			height: 50px;
			border-radius: 10px;
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #eef2ff;
			color: #2e55fa;
			font-size: 20px;
		}

		.cvm-card h6 {
			margin: 0 0 3px;
			font-weight: 700;
			color: #1f2533;
		}

		.cvm-card .sub {
			font-size: 13px;
			color: #6b7280;
			margin: 0;
		}

		.cvm-actions {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}
	</style>
</head>

<body id="bg">
	<div class="page-wraper">
		<div id="loading-area"></div>
		<div id="header-placeholder"></div>

		<div class="page-content bg-white">
			<div class="content-block">
				<div class="section-full bg-white p-t50 p-b20">
					<div class="container">
						<div class="row">
							<div class="col-xl-3 col-lg-4 m-b30">
								<div class="sticky-top">
									<div class="candidate-info">
										<div class="candidate-detail text-center">
											<div class="canditate-des">
												<a href="javascript:void(0);">
													<img alt="" src="images/team/pic1.jpg">
												</a>
											</div>
											<div class="candidate-title">
												<div class="">
													<h4 class="m-b5"><a href="javascript:void(0);">My Profile</a></h4>
													<p class="m-b0"><a href="javascript:void(0);"></a></p>
												</div>
											</div>
										</div>
										<ul>
											<li><a href="jobs-profile.html">
													<i class="far fa-user" aria-hidden="true"></i>
													<span>Profile</span></a></li>
											<li><a href="jobs-my-resume.html">
													<i class="far fa-file-alt" aria-hidden="true"></i>
													<span>My Resume</span></a></li>
											<li><a href="jobs-saved-jobs.html">
													<i class="far fa-heart" aria-hidden="true"></i>
													<span>Saved Jobs</span></a></li>
											<li><a href="jobs-applied-job.html">
													<i class="fa fa-briefcase" aria-hidden="true"></i>
													<span>Applied Jobs</span></a></li>
											<li><a href="jobs-alerts.html">
													<i class="far fa-bell" aria-hidden="true"></i>
													<span>Job Alerts</span></a></li>
											<li><a href="jobs-cv-manager.html" class="active">
													<i class="far fa-id-card" aria-hidden="true"></i>
													<span>CV Manager</span></a></li>
											<li><a href="jobs-change-password.html">
													<i class="fa fa-key" aria-hidden="true"></i>
													<span>Change Password</span></a></li>
											<li><a href="index.html">
													<i class="fas fa-sign-out-alt" aria-hidden="true"></i>
													<span>Log Out</span></a></li>
										</ul>
									</div>
								</div>
							</div>

							<div class="col-xl-9 col-lg-8 m-b30">
								<div id="cvmMessage" class="alert" role="alert" style="display:none;"></div>
								<div id="cvmLoading" class="text-center p-a30">
									<i class="fa fa-spinner fa-spin fa-2x text-primary"></i>
									<p class="m-t10">Loading...</p>
								</div>

								<div id="cvmContent" style="display:none;">
									<div class="job-bx clearfix">
										<div class="job-bx-title clearfix">
											<h5 class="font-weight-700 float-start text-uppercase">CV Manager</h5>
										</div>

										<!-- Generated CV (profil məlumatlarından) -->
										<div class="cvm-card">
											<div class="cvm-left">
												<div class="cvm-icon"><i class="fa fa-id-card"></i></div>
												<div>
													<h6>Generated CV</h6>
													<p class="sub">Profil məlumatlarınızdan avtomatik yaranan CV.</p>
												</div>
											</div>
											<div class="cvm-actions">
												<a href="cv-view.html?me=1" target="_blank"
													class="site-button button-sm"><i class="fa fa-eye"></i> View</a>
												<a href="cv-view.html?me=1" target="_blank"
													class="site-button button-sm"><i class="fa fa-download"></i>
													Download PDF</a>
											</div>
										</div>

										<!-- Uploaded Resume File -->
										<div class="cvm-card">
											<div class="cvm-left">
												<div class="cvm-icon" style="background:#ffeceb;color:#e74c3c;">
													<i class="fa fa-file-pdf"></i>
												</div>
												<div>
													<h6>Uploaded Resume File</h6>
													<p class="sub" id="cvmResumeStatus">No file uploaded yet.</p>
												</div>
											</div>
											<div class="cvm-actions" id="cvmResumeActions" style="display:none;">
												<a href="#" id="cvmResumeDownload" target="_blank"
													class="site-button button-sm"><i class="fa fa-download"></i>
													Download</a>
												<a href="javascript:void(0);" id="cvmResumeDelete"
													class="site-button button-sm"
													style="background:#dc3545;border-color:#dc3545;"><i
														class="fa fa-trash"></i> Delete</a>
											</div>
										</div>

										<!-- Upload / Replace -->
										<div class="m-t20">
											<label class="font-weight-600">Upload / Replace Resume (PDF, DOC, DOCX —
												max 5MB)</label>
											<div class="d-flex m-t5" style="gap:8px;">
												<input type="file" id="cvmFileInput" class="form-control"
													accept=".pdf,.doc,.docx">
												<button type="button" id="cvmUploadBtn" class="site-button button-sm">
													Upload <span id="cvmUploadSpinner" style="display:none;"><i
															class="fa fa-spinner fa-spin"></i></span></button>
											</div>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="footer-placeholder"></div>
		<button class="scroltop fa fa-chevron-up"></button>
	</div>

	<!-- JAVASCRIPT FILES -->
	<script src="js/jquery.min.js"></script>
	<script src="plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script src="plugins/bootstrap-select/bootstrap-select.min.js"></script>
	<script src="plugins/magnific-popup/magnific-popup.js"></script>
	<script src="js/custom.js"></script>
	<script src="js/dz.carousel.js"></script>
	<script src="js/dz.ajax.js"></script>

	<script src="js/script/api-client.js"></script>
	<script src="js/script/candidate-sidebar.js"></script>
	<script src="js/script/cv-manager.js"></script>

	<script src="js/headerAndFooter.js"></script>
</body>

</html>
