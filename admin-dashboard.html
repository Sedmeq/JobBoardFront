        .admin-stat-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .05);

            font-size: 32px;
            color: #2e55fa;
            margin-bottom: 10px;

        .admin-stat-card .stat-value {

        }

        .admin-stat-card .stat-label {
            color: #777;
            font-size: 14px;
            text-transform: uppercase;
