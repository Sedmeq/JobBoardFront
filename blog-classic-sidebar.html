<!DOCTYPE html>
<html lang="en">

<head>
	<title>Blog - JobBoard</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="images/favicon.ico" type="image/x-icon">

	<link rel="stylesheet" type="text/css" href="css/plugins.css">
	<link rel="stylesheet" type="text/css" href="css/style.css">
	<link rel="stylesheet" type="text/css" href="css/templete.css">
	<link class="skin" rel="stylesheet" type="text/css" href="css/skin/skin-1.css">
	<link rel="stylesheet" type="text/css" href="css/dark-layout.css">

	<style>
		/* Dark mode-da sidebar input/yazıların görünməsi */
		body.layout-dark .side-bar .form-control,
		body.layout-dark #blogSearchInput {
			color: #e7e9f2;
			background-color: #1f212c;
			border-color: #33364a;
		}

		body.layout-dark .side-bar .form-control::placeholder,
		body.layout-dark #blogSearchInput::placeholder {
			color: #9aa1ad;
		}

		body.layout-dark .widget-title,
		body.layout-dark .widget_archive ul li a,
		body.layout-dark .widget-post .post-title a,
		body.layout-dark .tagcloud a {
			color: #e7e9f2;
		}
	</style>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Roboto:wght@100;300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
		rel="stylesheet">
</head>

<body id="bg">
	<div class="page-wraper">
		<div id="loading-area"></div>
		<div id="header-placeholder"></div>

		<div class="page-content bg-white">
			<div class="dez-bnr-inr overlay-black-middle" style="background-image:url(images/banner/bnr1.jpg);">
				<div class="container">
					<div class="dez-bnr-inr-entry">
						<h1 class="text-white">Our Blog</h1>
						<div class="breadcrumb-row">
							<ul class="list-inline">
								<li><a href="index.html">Home</a></li>
								<li>Blog</li>
							</ul>
						</div>
					</div>
				</div>
			</div>

			<div class="content-area">
				<div class="container">
					<div class="row">
						<!-- Posts -->
						<div class="col-lg-8 col-md-7">
							<div id="blogActiveFilter" class="m-b20" style="display:none;">
								<span class="badge"
									style="background:#eef2ff;color:#2e55fa;padding:8px 14px;border-radius:20px;">
									<span id="blogActiveFilterText"></span>
									<a href="javascript:void(0);" id="blogClearFilter"
										style="color:#c0392b;margin-left:8px;">&times; clear</a>
								</span>
							</div>
							<div id="blogPostsContainer">
								<div class="text-center p-a30"><i class="fa fa-spinner fa-spin fa-2x text-primary"></i>
								</div>
							</div>
							<div class="pagination-bx clearfix m-t30">
								<ul class="pagination" id="blogPagination"></ul>
							</div>
						</div>

						<!-- Sidebar -->
						<div class="col-lg-4 col-md-5 sticky-top">
							<aside class="side-bar">
								<div class="widget">
									<h6 class="widget-title">Search</h6>
									<form id="blogSearchForm" class="search-bx">
										<div class="input-group">
											<input name="search" id="blogSearchInput" type="text" class="form-control"
												placeholder="Search articles...">
											<span class="input-group-btn">
												<button type="submit" class="site-button"><i
														class="fa fa-search"></i></button>
											</span>
										</div>
									</form>
								</div>

								<div class="widget recent-posts-entry">
									<h6 class="widget-title">Recent Posts</h6>
									<div class="widget-post-bx" id="blogRecentPosts">
										<p class="text-muted font-13">Loading...</p>
									</div>
								</div>

								<div class="widget widget_archive">
									<h6 class="widget-title">Categories</h6>
									<ul id="blogCategoriesList">
										<li class="text-muted font-13">Loading...</li>
									</ul>
								</div>

								<div class="widget widget_tag_cloud">
									<h6 class="widget-title">Tags</h6>
									<div class="tagcloud" id="blogTagsList">
										<span class="text-muted font-13">Loading...</span>
									</div>
								</div>
							</aside>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="footer-placeholder"></div>
		<button class="scroltop fa fa-chevron-up"></button>
	</div>

	<script src="js/jquery.min.js"></script>
	<script src="plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script src="plugins/bootstrap-select/bootstrap-select.min.js"></script>
	<script src="plugins/magnific-popup/magnific-popup.js"></script>
	<script src="js/custom.js"></script>
	<script src="js/dz.carousel.js"></script>
	<script src="js/dz.ajax.js"></script>

	<script src="js/script/api-client.js"></script>
	<script src="js/script/blog-classic.js"></script>

	<script src="js/headerAndFooter.js"></script>
</body>

</html>
