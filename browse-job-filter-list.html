<!DOCTYPE html>
<html lang="en">

<head>
	<title>Browse Jobs - JobBoard</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="images/favicon.ico" type="image/x-icon">

	<link rel="stylesheet" type="text/css" href="css/plugins.css">
	<link rel="stylesheet" type="text/css" href="css/style.css">
	<link rel="stylesheet" type="text/css" href="css/templete.css">
	<link class="skin" rel="stylesheet" type="text/css" href="css/skin/skin-1.css">
	<link rel="stylesheet" type="text/css" href="css/dark-layout.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Roboto:wght@100;300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
		rel="stylesheet">
</head>

<body id="bg">
	<div class="page-wraper">
		<div id="loading-area"></div>
		<div id="header-placeholder"></div>

		<div class="page-content bg-white">
			<!-- inner page banner -->
			<div class="dez-bnr-inr overlay-black-middle" style="background-image:url(images/banner/bnr1.jpg);">
				<div class="container">
					<div class="dez-bnr-inr-entry">
						<h1 class="text-white">Browse Jobs</h1>
						<div class="breadcrumb-row">
							<ul class="list-inline">
								<li><a href="index.html">Home</a></li>
								<li>Browse Jobs</li>
							</ul>
						</div>
					</div>
				</div>
			</div>

			<!-- Filters Search -->
			<div class="section-full browse-job-find">
				<div class="container">
					<div class="find-job-bx">
						<form id="bjlSearchForm">
							<div class="row">
								<div class="col-lg-4 col-md-6">
									<div class="form-group">
										<label>Job Title or Keyword</label>
										<input type="text" id="bjlKeyword" class="form-control"
											placeholder="e.g. Developer, Designer">
									</div>
								</div>
								<div class="col-lg-3 col-md-6">
									<div class="form-group">
										<label>Location</label>
										<input type="text" id="bjlLocation" class="form-control"
											placeholder="e.g. Bakı">
									</div>
								</div>
								<div class="col-lg-3 col-md-6">
									<div class="form-group">
										<label>Sort By</label>
										<select id="bjlSort" class="form-control">
											<option value="newest">Newest</option>
											<option value="oldest">Oldest</option>
											<option value="salary_desc">Salary (high → low)</option>
											<option value="salary_asc">Salary (low → high)</option>
										</select>
									</div>
								</div>
								<div class="col-lg-2 col-md-6 d-flex align-items-end">
									<button type="submit" class="site-button btn-block" style="width:100%;">Find
										Job</button>
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>

			<div class="content-block">
				<div class="section-full browse-job p-b50">
					<div class="container">
						<div class="row">
							<!-- Filter sidebar -->
							<div class="col-xl-3 col-lg-4 col-md-5 m-b30">
								<aside class="sticky-top sidebar-filter">
									<h6 class="title"><i class="fa fa-sliders m-r5"></i> Refine By
										<a href="javascript:void(0);" id="bjlReset" class="font-12 float-end">Reset</a>
									</h6>

									<div class="form-group">
										<label class="font-weight-600">Category</label>
										<select id="bjlCategory" class="form-control">
											<option value="">All categories</option>
										</select>
									</div>

									<div class="form-group">
										<label class="font-weight-600">Job Type</label>
										<div id="bjlTypeGroup">
											<div class="form-check"><input class="form-check-input bjl-type"
													type="checkbox" id="t-ft" value="Full-time"><label
													class="form-check-label" for="t-ft">Full Time</label></div>
											<div class="form-check"><input class="form-check-input bjl-type"
													type="checkbox" id="t-pt" value="Part-time"><label
													class="form-check-label" for="t-pt">Part Time</label></div>
											<div class="form-check"><input class="form-check-input bjl-type"
													type="checkbox" id="t-ct" value="Contract"><label
													class="form-check-label" for="t-ct">Contract</label></div>
											<div class="form-check"><input class="form-check-input bjl-type"
													type="checkbox" id="t-in" value="Internship"><label
													class="form-check-label" for="t-in">Internship</label></div>
										</div>
									</div>

									<div class="form-group">
										<label class="font-weight-600">Experience Level</label>
										<select id="bjlExp" class="form-control">
											<option value="">Any</option>
											<option value="Junior">Junior</option>
											<option value="Mid">Mid</option>
											<option value="Senior">Senior</option>
										</select>
									</div>

									<div class="form-group">
										<label class="font-weight-600">Salary Range</label>
										<div class="d-flex" style="gap:8px;">
											<input type="number" id="bjlSalaryMin" class="form-control"
												placeholder="Min" min="0">
											<input type="number" id="bjlSalaryMax" class="form-control"
												placeholder="Max" min="0">
										</div>
									</div>

									<div class="form-group">
										<div class="form-check">
											<input class="form-check-input" type="checkbox" id="bjlRemote">
											<label class="form-check-label" for="bjlRemote">Remote only</label>
										</div>
									</div>

									<button type="button" id="bjlApply" class="site-button btn-block"
										style="width:100%;"><i class="fa fa-filter"></i> Apply Filters</button>
								</aside>
							</div>

							<!-- Results -->
							<div class="col-xl-9 col-lg-8 col-md-7">
								<div class="job-bx-title job-bx-list clearfix">
									<h5 class="font-weight-700 pull-left text-uppercase" id="bjlFoundLabel">Jobs</h5>
								</div>
								<ul class="post-job-bx browse-job-grid post-job-bx-list row" id="bjlJobsBody">
									<li class="col-12 text-center p-a30">
										<i class="fa fa-spinner fa-spin fa-2x text-primary"></i>
									</li>
								</ul>
								<div class="pagination-bx float-end">
									<ul class="pagination" id="bjlPagination"></ul>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="footer-placeholder"></div>
		<button class="scroltop fa fa-chevron-up"></button>
	</div>

	<script src="js/jquery.min.js"></script>
	<script src="plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script src="plugins/bootstrap-select/bootstrap-select.min.js"></script>
	<script src="plugins/magnific-popup/magnific-popup.js"></script>
	<script src="js/custom.js"></script>
	<script src="js/dz.carousel.js"></script>
	<script src="js/dz.ajax.js"></script>

	<script src="js/script/api-client.js"></script>
	<script src="js/script/browse-jobs-filter.js"></script>

	<script src="js/headerAndFooter.js"></script>
</body>

</html>
