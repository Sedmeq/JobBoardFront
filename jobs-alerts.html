<!DOCTYPE html>
<html lang="en">

<head>
	<title>Job Alerts - JobBoard</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="images/favicon.ico" type="image/x-icon">

	<!-- STYLESHEETS -->
	<link rel="stylesheet" type="text/css" href="css/plugins.css">
	<link rel="stylesheet" type="text/css" href="css/style.css">
	<link rel="stylesheet" type="text/css" href="css/templete.css">
	<link class="skin" rel="stylesheet" type="text/css" href="css/skin/skin-1.css">
	<link rel="stylesheet" type="text/css" href="css/dark-layout.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Roboto:wght@100;300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
		rel="stylesheet">
</head>

<body id="bg">
	<div class="page-wraper">
		<div id="loading-area"></div>
		<div id="header-placeholder"></div>

		<div class="page-content bg-white">
			<div class="content-block">
				<div class="section-full bg-white p-t50 p-b20">
					<div class="container">
						<div class="row">
							<div class="col-xl-3 col-lg-4 m-b30">
								<div class="sticky-top">
									<div class="candidate-info">
										<div class="candidate-detail text-center">
											<div class="canditate-des">
												<a href="javascript:void(0);">
													<img alt="" src="images/team/pic1.jpg">
												</a>
											</div>
											<div class="candidate-title">
												<div class="">
													<h4 class="m-b5"><a href="javascript:void(0);">My Profile</a></h4>
													<p class="m-b0"><a href="javascript:void(0);"></a></p>
												</div>
											</div>
										</div>
										<ul>
											<li><a href="jobs-profile.html">
													<i class="far fa-user" aria-hidden="true"></i>
													<span>Profile</span></a></li>
											<li><a href="jobs-my-resume.html">
													<i class="far fa-file-alt" aria-hidden="true"></i>
													<span>My Resume</span></a></li>
											<li><a href="jobs-saved-jobs.html">
													<i class="far fa-heart" aria-hidden="true"></i>
													<span>Saved Jobs</span></a></li>
											<li><a href="jobs-applied-job.html">
													<i class="fa fa-briefcase" aria-hidden="true"></i>
													<span>Applied Jobs</span></a></li>
											<li><a href="jobs-alerts.html" class="active">
													<i class="far fa-bell" aria-hidden="true"></i>
													<span>Job Alerts</span></a></li>
											<li><a href="jobs-cv-manager.html">
													<i class="far fa-id-card" aria-hidden="true"></i>
													<span>CV Manager</span></a></li>
											<li><a href="jobs-change-password.html">
													<i class="fa fa-key" aria-hidden="true"></i>
													<span>Change Password</span></a></li>
											<li><a href="index.html">
													<i class="fas fa-sign-out-alt" aria-hidden="true"></i>
													<span>Log Out</span></a></li>
										</ul>
									</div>
								</div>
							</div>

							<div class="col-xl-9 col-lg-8 m-b30">
								<div id="alertsMessage" class="alert" role="alert" style="display:none;"></div>

								<!-- Create Alert -->
								<div class="job-bx m-b30">
									<div class="job-bx-title clearfix">
										<h5 class="font-weight-700 float-start text-uppercase">Create Job Alert</h5>
									</div>
									<form id="createAlertForm">
										<div class="row">
											<div class="col-md-6 form-group">
												<label>Alert Name *</label>
												<input type="text" id="alertName" class="form-control"
													placeholder="e.g. Backend Developer jobs">
											</div>
											<div class="col-md-6 form-group">
												<label>Keyword</label>
												<input type="text" id="alertKeyword" class="form-control"
													placeholder="e.g. .NET, React">
											</div>
											<div class="col-md-6 form-group">
												<label>Location</label>
												<input type="text" id="alertLocation" class="form-control"
													placeholder="e.g. Bakı">
											</div>
											<div class="col-md-6 form-group">
												<label>Category</label>
												<select id="alertCategory" class="form-control">
													<option value="">All categories</option>
												</select>
											</div>
											<div class="col-md-6 form-group">
												<label>Job Type</label>
												<select id="alertJobType" class="form-control">
													<option value="">Any</option>
													<option value="full-time">Full Time</option>
													<option value="part-time">Part Time</option>
													<option value="contract">Contract</option>
													<option value="internship">Internship</option>
													<option value="remote">Remote</option>
												</select>
											</div>
											<div class="col-md-6 form-group">
												<label>Frequency</label>
												<select id="alertFrequency" class="form-control">
													<option value="daily">Daily</option>
													<option value="weekly">Weekly</option>
													<option value="instant">Instant</option>
												</select>
											</div>
										</div>
										<button type="submit" id="createAlertBtn" class="site-button">
											<i class="fa fa-plus"></i> Create Alert</button>
									</form>
								</div>

								<!-- Alerts List -->
								<div class="job-bx table-job-bx clearfix">
									<div class="job-bx-title clearfix">
										<h5 class="font-weight-700 float-start text-uppercase" id="alertsTitle">Job
											Alerts</h5>
									</div>
									<table>
										<thead>
											<tr>
												<th>Alert</th>
												<th>Criteria</th>
												<th>Date</th>
												<th>Status</th>
												<th></th>
											</tr>
										</thead>
										<tbody id="alertsBody">
											<tr>
												<td colspan="5" class="text-center p-a20">
													<i class="fa fa-spinner fa-spin fa-2x text-primary"></i>
												</td>
											</tr>
										</tbody>
									</table>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="footer-placeholder"></div>
		<button class="scroltop fa fa-chevron-up"></button>
	</div>

	<!-- JAVASCRIPT FILES -->
	<script src="js/jquery.min.js"></script>
	<script src="plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script src="plugins/bootstrap-select/bootstrap-select.min.js"></script>
	<script src="plugins/magnific-popup/magnific-popup.js"></script>
	<script src="js/custom.js"></script>
	<script src="js/dz.carousel.js"></script>
	<script src="js/dz.ajax.js"></script>

	<script src="js/script/api-client.js"></script>
	<script src="js/script/candidate-sidebar.js"></script>
	<script src="js/script/job-alerts.js"></script>

	<script src="js/headerAndFooter.js"></script>
</body>

</html>
